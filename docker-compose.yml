# BUPA Sync Automation - Full Local Docker Stack
# Run: docker-compose up --build
# With ngrok: docker-compose --profile ngrok up --build
# Access: Dashboard at http://localhost:3001

services:
  # PostgreSQL (shared database server for n8n and backend)
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bpsync
      - POSTGRES_PASSWORD=bpsync
      - POSTGRES_DB=bpsync
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U bpsync -d bpsync"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bpsync

  # pgAdmin (PostgreSQL management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@bupa-sync.dev
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bpsync

  # Qdrant (vector database for RAG/embeddings)
  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - bpsync

  # ngrok (optional - exposes dashboard to the internet via HTTPS)
  # Activate with: docker-compose --profile ngrok up
  # Set NGROK_AUTHTOKEN and NGROK_DOMAIN in .env file
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["ngrok"]
    command: http --domain=${NGROK_DOMAIN:-localhost} dashboard:80 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"
    depends_on:
      dashboard:
        condition: service_started
    networks:
      - bpsync

  # n8n Workflow Importer (runs once BEFORE n8n starts, imports directly into DB)
  n8n-import:
    image: n8nio/n8n:latest
    container_name: bpsync-n8n-import
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=bpsync
      - DB_POSTGRESDB_PASSWORD=bpsync
    entrypoint: /bin/sh
    command:
      - "-c"
      - "for f in /workflows/*.json; do echo Importing $$f; n8n import:workflow --input=$$f; done && echo Done."
    volumes:
      - ./docker/n8n-import/workflows:/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bpsync

  # n8n Workflow Engine (pre-loaded with BUPA Sync workflows)
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n:5678
      - N8N_SECURE_COOKIE=false
      - N8N_RUNNERS_ENABLED=true
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=bpsync
      - DB_POSTGRESDB_PASSWORD=bpsync
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      n8n-import:
        condition: service_completed_successfully
    networks:
      - bpsync

  # React Dashboard (Vite production build served by nginx)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bpsync

  # Backend API (FastAPI - settings, proxy, orchestration)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - backend-data:/app/data
    environment:
      - DEPLOYMENT_MODE=docker
      - DATABASE_URL=postgresql://bpsync:bpsync@postgres:5432/bpsync
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      mock-s4hana:
        condition: service_healthy
    networks:
      - bpsync

  # BUPA Sync Agent (Python A2A)
  bupa-sync-agent:
    build:
      context: ./assets/bupa-sync-agent
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/app/shared-data
    environment:
      - SETTINGS_PATH=/app/shared-data/settings.json
      - DEPLOYMENT_MODE=docker
      - LLM_BASE_URL=http://host.docker.internal:6655/litellm/v1
      - LLM_MODEL=anthropic--claude-4.6-sonnet
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bpsync

  # Mock S/4HANA (simulates SAP backend)
  mock-s4hana:
    build:
      context: ./mock-s4hana
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/pa0000"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bpsync

  # Mailpit (local SMTP + web UI for email testing)
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8025/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - bpsync

volumes:
  postgres-data:
  pgadmin-data:
  qdrant-data:
  backend-data:
  n8n-data:

networks:
  bpsync:
    driver: bridge
