server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver; resolve upstreams per-request so
    # nginx starts even if n8n/mailpit/pgadmin are not yet up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API proxy to backend — pass full URI as-is (backend mounts at /api/)
    location /api/ {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass upstream proto (from ngrok/LB) or fall back to current scheme
        set $proto $scheme;
        if ($http_x_forwarded_proto) {
            set $proto $http_x_forwarded_proto;
        }
        proxy_set_header X-Forwarded-Proto $proto;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    # n8n webhook endpoints — pass full URI as-is (n8n listens at /webhook/)
    location /webhook/ {
        set $n8n_upstream http://n8n:5678;
        proxy_pass $n8n_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /webhook-test/ {
        set $n8n_upstream http://n8n:5678;
        proxy_pass $n8n_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Mailpit UI — strip /mailpit/ prefix, serve from mailpit root
    location /mailpit/ {
        set $mailpit_upstream http://mailpit:8025;
        rewrite ^/mailpit/(.*)$ /$1 break;
        proxy_pass $mailpit_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # pgAdmin — strip /pgadmin/ prefix, serve from pgadmin root
    location /pgadmin/ {
        set $pgadmin_upstream http://pgadmin:80;
        rewrite ^/pgadmin/(.*)$ /$1 break;
        proxy_pass $pgadmin_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Script-Name /pgadmin;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
